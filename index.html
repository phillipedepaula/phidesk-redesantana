<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhiDesk — Controle de Demandas</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#EDEEF2;--bg2:#E4E6EC;--surface:#FFFFFF;--surface2:#F5F6F9;
  --border:#D5D8E0;--border2:#C8CBD6;
  --navy:#1B2B4B;--navy2:#243660;--navy3:#2E4480;
  --text:#1B2B4B;--text-dim:#5A6480;--text-muted:#9299AF;
  --accent:#2E4480;--accent-hover:#243660;
  --green:#1A7A4A;--green-bg:#E8F5EE;--green-border:#B8DFC9;
  --red:#C0392B;--red-bg:#FDECEA;--red-border:#F5BDB8;
  --amber:#A0620A;--amber-bg:#FEF6E4;--amber-border:#F0D898;
  --orange:#B84A00;--orange-bg:#FEF0E6;--orange-border:#F0C8A0;
  --blue-bg:#EBF0FB;--blue-border:#B8C8F0;
  --purple:#5B3FA0;--purple-bg:#F0EBFB;
  --sidebar:252px;--header:58px;
  --radius:10px;
  --shadow:0 1px 3px rgba(27,43,75,.08),0 4px 12px rgba(27,43,75,.05);
  --shadow-lg:0 4px 16px rgba(27,43,75,.12),0 8px 32px rgba(27,43,75,.08);
}
html,body{height:100%;font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;overflow:hidden}
a{color:var(--accent);text-decoration:none}
button{font-family:inherit;cursor:pointer}
.layout{display:flex;height:100vh}
.sidebar{width:var(--sidebar);flex-shrink:0;background:var(--navy);display:flex;flex-direction:column;overflow:hidden}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.sidebar-logo{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.logo-mark{font-family:'Playfair Display',serif;font-size:20px;color:#fff;letter-spacing:-.3px}
.logo-mark span{color:#7B9FE8}
.logo-sub{font-size:10px;color:rgba(255,255,255,.35);letter-spacing:.8px;text-transform:uppercase;margin-top:3px;font-weight:500}
.sidebar-section{padding:10px 0;flex:1;overflow-y:auto}
.sidebar-section::-webkit-scrollbar{width:3px}
.sidebar-section::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1)}
.sidebar-group-label{padding:10px 18px 5px;font-size:9.5px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.3);font-weight:600}
.sidebar-group-pill{margin:14px 12px 4px;padding:7px 12px;border-radius:8px;display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;letter-spacing:.2px}
.sidebar-group-pill.rs{background:rgba(123,159,232,.18);border:1px solid rgba(123,159,232,.3);color:#A8C4F0}
.sidebar-group-pill.es{background:rgba(52,199,130,.14);border:1px solid rgba(52,199,130,.25);color:#6EDBA8}
.sidebar-group-pill .pill-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sidebar-group-pill.rs .pill-dot{background:#7B9FE8}
.sidebar-group-pill.es .pill-dot{background:#3DC78A}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:9px 18px;cursor:pointer;border-left:2px solid transparent;transition:all .15s;color:rgba(255,255,255,.5);font-size:13px;font-weight:500}
.sidebar-item:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.85)}
.sidebar-item.active{border-left-color:#7B9FE8;background:rgba(123,159,232,.1);color:#fff}
.si-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.si-label{flex:1}
.si-count{font-size:10px;font-weight:700;background:rgba(255,255,255,.12);color:rgba(255,255,255,.7);border-radius:8px;padding:1px 6px;min-width:18px;text-align:center}
.si-count.urgent{background:var(--red);color:#fff}
.si-count.ok{background:rgba(26,122,74,.6);color:#fff}
.sidebar-footer{padding:14px 18px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:rgba(255,255,255,.3)}
.sidebar-footer strong{color:rgba(255,255,255,.5);display:block;margin-bottom:2px}
.main-header{height:var(--header);flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;gap:12px;box-shadow:0 1px 0 var(--border)}
.header-left h1{font-family:'Playfair Display',serif;font-size:17px;color:var(--navy);font-weight:600}
.header-left .h-sub{font-size:11px;color:var(--text-muted);margin-top:1px}
.header-actions{display:flex;gap:8px;align-items:center}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;font-size:13px;font-weight:500;border:1px solid var(--border);background:var(--surface);color:var(--text);transition:all .15s;cursor:pointer}
.btn:hover{background:var(--surface2);border-color:var(--border2)}
.btn.primary{background:var(--navy);border-color:var(--navy);color:#fff}
.btn.primary:hover{background:var(--navy2)}
.btn.danger{background:var(--red-bg);border-color:var(--red-border);color:var(--red)}
.btn.success{background:var(--green-bg);border-color:var(--green-border);color:var(--green)}
.btn.sm{padding:5px 10px;font-size:12px}
.btn.ghost{background:transparent;border-color:transparent;color:var(--text-dim)}
.btn.ghost:hover{background:var(--surface2);border-color:var(--border)}
.content{flex:1;overflow-y:auto;padding:20px 24px}
.content::-webkit-scrollbar{width:6px}
.content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.stats-row{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.stat-card{flex:1;min-width:110px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow)}
.stat-card .sc-val{font-size:26px;font-weight:700;font-family:'Playfair Display',serif;line-height:1.1;color:var(--navy)}
.stat-card .sc-label{font-size:10.5px;color:var(--text-muted);margin-top:5px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.stat-card.red{border-left:3px solid var(--red)}.stat-card.red .sc-val{color:var(--red)}
.stat-card.amber{border-left:3px solid var(--amber)}.stat-card.amber .sc-val{color:var(--amber)}
.stat-card.green{border-left:3px solid var(--green)}.stat-card.green .sc-val{color:var(--green)}
.stat-card.blue{border-left:3px solid var(--accent)}.stat-card.blue .sc-val{color:var(--accent)}
.toolbar{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.search-wrap{flex:1;min-width:200px;position:relative}
.search-wrap input{width:100%;padding:8px 12px 8px 34px;background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;font-family:inherit;transition:border-color .15s;box-shadow:var(--shadow)}
.search-wrap input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(46,68,128,.1)}
.search-wrap input::placeholder{color:var(--text-muted)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:13px;pointer-events:none}
.filter-select{padding:7px 10px;background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;font-family:inherit;box-shadow:var(--shadow);cursor:pointer}
.filter-select:focus{outline:none;border-color:var(--accent)}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.table-wrap table{width:100%;border-collapse:collapse}
.table-wrap th{background:var(--surface2);padding:10px 14px;text-align:left;font-size:10.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--text-muted);border-bottom:1px solid var(--border);white-space:nowrap}
.table-wrap td{padding:11px 14px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
.table-wrap tr:last-child td{border-bottom:none}
.table-wrap tr.clickable{cursor:pointer;transition:background .1s}
.table-wrap tr.clickable:hover td{background:var(--bg2)}
.table-wrap tr.row-vencido td:first-child{border-left:3px solid var(--red)}
.table-wrap tr.row-urgente td:first-child{border-left:3px solid var(--amber)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;white-space:nowrap;border:1px solid transparent}
.badge.red{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}
.badge.green{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.badge.amber{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-border)}
.badge.blue{background:var(--blue-bg);color:var(--accent);border-color:var(--blue-border)}
.badge.orange{background:var(--orange-bg);color:var(--orange);border-color:var(--orange-border)}
.badge.purple{background:var(--purple-bg);color:var(--purple);border-color:#D5C8F0}
.badge.muted{background:var(--surface2);color:var(--text-muted);border-color:var(--border)}
.deadline-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:5px;font-size:11.5px;font-weight:600;border:1px solid transparent;white-space:nowrap}
.deadline-chip.vencido{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}
.deadline-chip.hoje{background:var(--orange-bg);color:var(--orange);border-color:var(--orange-border)}
.deadline-chip.amanha{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-border)}
.deadline-chip.breve{background:var(--blue-bg);color:var(--accent);border-color:var(--blue-border)}
.deadline-chip.ok{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.deadline-chip.sem-prazo{background:var(--surface2);color:var(--text-muted);border-color:var(--border);font-weight:400}
.agenda-section{margin-bottom:22px}
.agenda-section-header{display:flex;align-items:center;gap:10px;padding:0 0 10px;margin-bottom:12px;border-bottom:2px solid var(--border)}
.agenda-section-header h3{font-size:13px;font-weight:700}
.agenda-count{font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px}
.agenda-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:all .15s;border-left:4px solid transparent;box-shadow:var(--shadow)}
.agenda-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-1px)}
.agenda-card.vencido{border-left-color:var(--red)}
.agenda-card.hoje{border-left-color:var(--orange)}
.agenda-card.amanha{border-left-color:var(--amber)}
.agenda-card.breve{border-left-color:var(--accent)}
.ac-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:6px}
.ac-ticket{font-size:10.5px;font-weight:700;color:var(--text-muted);letter-spacing:.6px;margin-bottom:2px}
.ac-cliente{font-size:14px;font-weight:600;color:var(--navy)}
.ac-desc{font-size:12px;color:var(--text-dim);line-height:1.55;margin-top:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ac-meta{display:flex;gap:6px;align-items:center;margin-top:10px;flex-wrap:wrap}
.dash-section{margin-bottom:24px}
.dash-section h3{font-family:'Playfair Display',serif;font-size:15px;color:var(--navy);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.team-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}
.team-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.team-card .tc-name{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.tc-avatar{width:28px;height:28px;border-radius:50%;background:var(--navy);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tc-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:12px}
.tc-row span:first-child{color:var(--text-dim)}
.tc-row strong{color:var(--navy);font-weight:700}
.tc-divider{height:1px;background:var(--border);margin:8px 0}
.overview-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.overview-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.overview-card h4{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px}
.cat-row{display:flex;align-items:center;gap:10px;padding:5px 0;font-size:12px}
.cat-bar-wrap{flex:1;height:6px;background:var(--bg2);border-radius:3px;overflow:hidden}
.cat-bar{height:100%;background:var(--navy);border-radius:3px}
.cat-count{font-size:11px;font-weight:700;color:var(--text-dim);min-width:24px;text-align:right}
.cat-label{width:140px;flex-shrink:0;color:var(--text-dim)}
.modal-overlay{position:fixed;inset:0;background:rgba(27,43,75,.35);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px)}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:100%;max-width:780px;max-height:90vh;display:flex;flex-direction:column;box-shadow:var(--shadow-lg)}
.modal-header{padding:22px 26px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;gap:16px;background:var(--surface2);border-radius:14px 14px 0 0}
.modal-header h2{font-family:'Playfair Display',serif;font-size:19px;color:var(--navy)}
.modal-body{padding:22px 26px;overflow-y:auto;flex:1}
.modal-body::-webkit-scrollbar{width:4px}
.modal-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.modal-footer{padding:14px 26px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;background:var(--surface2);border-radius:0 0 14px 14px}
.modal-close{background:none;border:none;color:var(--text-muted);font-size:18px;cursor:pointer;padding:4px;line-height:1;border-radius:4px}
.modal-close:hover{background:var(--bg2);color:var(--text)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid.c1{grid-template-columns:1fr}
.form-grid.c3{grid-template-columns:1fr 1fr 1fr}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.s2{grid-column:1/-1}
.form-group label{font-size:10.5px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px}
.form-group input,.form-group select,.form-group textarea{padding:8px 10px;background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;font-family:inherit;transition:border-color .15s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(46,68,128,.08)}
.form-group textarea{resize:vertical;min-height:80px}
.form-section{margin-bottom:20px}
.form-section h4{font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--navy);padding-bottom:8px;border-bottom:1px solid var(--border);margin-bottom:12px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.detail-item label{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px}
.detail-item .dv{font-size:13px;color:var(--text);word-break:break-word}
.detail-item.s2{grid-column:1/-1}
.detail-desc{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:12px;font-size:13px;line-height:1.6;color:var(--text-dim);margin-top:4px}
.detail-desc.obs{background:var(--amber-bg);border-color:var(--amber-border)}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-muted)}
.empty-state .es-icon{font-size:36px;margin-bottom:12px}
.pagination{display:flex;align-items:center;justify-content:space-between;padding-top:14px;font-size:12px;color:var(--text-muted)}
.page-btns{display:flex;gap:4px}
.page-btn{padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:12px;transition:all .15s}
.page-btn:hover{color:var(--navy);border-color:var(--navy)}
.page-btn.active{background:var(--navy);border-color:var(--navy);color:#fff}
.page-btn:disabled{opacity:.4;cursor:default}
.toast{position:fixed;bottom:20px;right:20px;z-index:300;background:var(--navy);color:#fff;border-radius:8px;padding:12px 18px;font-size:13px;font-weight:500;box-shadow:var(--shadow-lg);transform:translateY(16px);opacity:0;transition:all .25s;max-width:320px}
.toast.show{transform:none;opacity:1}
.toast.success{background:var(--green)}
.toast.error{background:var(--red)}
.hidden{display:none!important}
.clip{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:190px}
.nowrap{white-space:nowrap}
.flex-c{display:flex;align-items:center;gap:6px}

.drawer-overlay{position:fixed;inset:0;background:rgba(27,43,75,.25);z-index:200;backdrop-filter:blur(2px);animation:fadeIn .15s ease}
.drawer{position:fixed;top:0;right:0;width:480px;max-width:95vw;height:100vh;background:var(--surface);border-left:1px solid var(--border);box-shadow:-4px 0 24px rgba(27,43,75,.12);display:flex;flex-direction:column;z-index:201;animation:slideIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{transform:translateX(40px);opacity:0}to{transform:none;opacity:1}}
.drawer-header{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--surface2);flex-shrink:0}
.drawer-header .dh-left{display:flex;align-items:center;gap:10px}
.drawer-header h3{font-family:'Playfair Display',serif;font-size:16px;color:var(--navy)}
.drawer-header .dh-sub{font-size:11px;color:var(--text-muted);margin-top:2px}
.drawer-close{background:none;border:none;color:var(--text-muted);font-size:18px;cursor:pointer;padding:4px 6px;border-radius:5px;line-height:1}
.drawer-close:hover{background:var(--bg2);color:var(--text)}
.drawer-body{flex:1;overflow-y:auto;padding:14px 16px}
.drawer-body::-webkit-scrollbar{width:4px}
.drawer-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.drawer-ticket{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:all .15s;border-left:3px solid transparent}
.drawer-ticket:hover{background:var(--bg2);box-shadow:0 2px 8px rgba(27,43,75,.08);transform:translateY(-1px)}
.drawer-ticket.vencido{border-left-color:var(--red)}
.drawer-ticket.hoje{border-left-color:var(--orange)}
.drawer-ticket.amanha{border-left-color:var(--amber)}
.drawer-ticket.breve{border-left-color:var(--accent)}
.drawer-ticket.ok{border-left-color:var(--green)}
.drawer-ticket.sem-prazo{border-left-color:var(--border2)}
.dt-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:5px}
.dt-ticket{font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--text-muted)}
.dt-cliente{font-size:13px;font-weight:600;color:var(--navy);line-height:1.3}
.dt-desc{font-size:11.5px;color:var(--text-dim);line-height:1.5;margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.dt-meta{display:flex;gap:5px;align-items:center;margin-top:8px;flex-wrap:wrap}
.drawer-empty{text-align:center;padding:40px 16px;color:var(--text-muted);font-size:13px}
.team-card{cursor:pointer;transition:all .15s}
.team-card:hover{box-shadow:0 4px 16px rgba(27,43,75,.12);transform:translateY(-2px);border-color:var(--navy)}

.alert-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:20px}
.alert-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow)}
.alert-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.alert-card.hoje{border-left:4px solid var(--orange)}
.alert-card.amanha{border-left:4px solid var(--amber)}
.alert-card.terceiro{border-left:4px solid var(--accent)}
.ac-icon{font-size:22px;flex-shrink:0}
.ac-info{flex:1}
.ac-title{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:2px}
.ac-count{font-size:24px;font-weight:700;font-family:'Playfair Display',serif;line-height:1}
.ac-sub{font-size:11px;color:var(--text-muted);margin-top:3px}
.ac-arrow{font-size:16px;color:var(--text-muted)}
.alert-card:hover .ac-arrow{color:var(--navy)}

var STATUS_OPTS=['Aberto','Em andamento','Aguardando documento','Aguardando cliente','Encerrado'];

const TODAY = new Date(); TODAY.setHours(0,0,0,0);
let S = {
  view: 'rs-tickets',
  data: { rs: JSON.parse(JSON.stringify(RAW.redeSantana)), es: JSON.parse(JSON.stringify(RAW.escritorio)) },
  f: { q:'', status:'', tipo:'', cat:'', resp:'' },
  page: 1, pp: 25
};

function fmtDate(s){ if(!s)return '—'; try{ return new Date(s+'T12:00:00').toLocaleDateString('pt-BR'); }catch(e){ return s; } }
function diffDays(p){ if(!p)return null; const d=new Date(p+'T12:00:00'); return isNaN(d)?null:Math.floor((d-TODAY)/86400000); }
function uCls(d){ if(d===null)return 'sem-prazo'; if(d<0)return 'vencido'; if(d===0)return 'hoje'; if(d===1)return 'amanha'; if(d<=3)return 'breve'; return 'ok'; }
function uLbl(d,p){ if(d===null)return p?fmtDate(p):'Sem prazo'; if(d<0)return 'Vencido '+Math.abs(d)+'d'; if(d===0)return 'Vence hoje'; if(d===1)return 'Amanhã'; return fmtDate(p)+' ('+d+'d)'; }
function sCls(s){ return {'Aberto':'blue','Em andamento':'amber','Aguardando documento':'orange','Aguardando cliente':'purple','Encerrado':'green'}[s]||'muted'; }
function tCls(t){ return {'Processo Judicial':'blue','ANP':'amber','PROCON':'orange','Ministério Público':'purple','Notificação Extrajudicial':'muted','ANTT':'muted','MTE':'red','Locação':'green','Outros':'muted','Cível':'blue'}[t]||'muted'; }
function ds(){ return S.view.startsWith('rs')?S.data.rs:S.data.es; }
function uc(sec){ return S.data[sec].filter(function(r){ if(r.status==='Encerrado')return false; var d=diffDays(r.prazo); return d!==null&&d<=3; }).length; }

function sortUrg(arr){
  return arr.slice().sort(function(a,b){
    var da=diffDays(a.prazo), db=diffDays(b.prazo);
    if(da===null&&db===null)return 0;
    if(da===null)return 1; if(db===null)return -1;
    return da-db;
  });
}

function filtered(){
  var q=S.f.q.toLowerCase(), st=S.f.status, ti=S.f.tipo, ca=S.f.cat, re=S.f.resp;
  var rows=ds().filter(function(r){
    if(q&&JSON.stringify(r).toLowerCase().indexOf(q)<0)return false;
    if(st&&r.status!==st)return false;
    if(ti&&r.tipoDemanda!==ti)return false;
    if(ca&&r.categoria!==ca)return false;
    if(re&&r.respInterno!==re&&r.respExterno!==re)return false;
    return true;
  });
  return sortUrg(rows);
}

function updateBadges(){
  document.getElementById('b-rs-t').textContent=S.data.rs.length;
  document.getElementById('b-es-t').textContent=S.data.es.length;
  var ru=uc('rs'), eu=uc('es');
  var bra=document.getElementById('b-rs-a'); bra.textContent=ru; bra.className='si-count'+(ru>0?' urgent':' ok');
  var bea=document.getElementById('b-es-a'); bea.textContent=eu; bea.className='si-count'+(eu>0?' urgent':' ok');
}

function go(key,el){
  S.view=key; S.page=1; S.f={q:'',status:'',tipo:'',cat:'',resp:''};
  document.querySelectorAll('.sidebar-item').forEach(function(x){ x.classList.remove('active'); });
  if(el) el.classList.add('active');
  var t={'dash':'Visão Geral','rs-tickets':'Rede Santana — Tickets','rs-agenda':'Rede Santana — Demandas do Dia','es-tickets':'Escritório — Tickets','es-agenda':'Escritório — Demandas do Dia'};
  document.getElementById('view-title').textContent=t[key]||key;
  document.getElementById('btn-new').classList.toggle('hidden',!key.endsWith('tickets'));
  document.getElementById('btn-csv').classList.toggle('hidden',!key.endsWith('tickets'));
  render();
}

function render(){
  updateBadges();
  var c=document.getElementById('content');
  if(S.view==='dash') c.innerHTML=renderDash();
  else if(S.view.endsWith('tickets')) c.innerHTML=renderTickets();
  else c.innerHTML=renderAgenda();
  var f=filtered();
  var subs={'dash':'','rs-tickets':f.length+' de '+S.data.rs.length+' tickets','rs-agenda':uc('rs')+' demandas urgentes','es-tickets':f.length+' de '+S.data.es.length+' tickets','es-agenda':uc('es')+' demandas urgentes'};
  document.getElementById('view-sub').textContent=subs[S.view]||'';
  // Table status save delegation
  var ca=document.getElementById('content');
  ca.onclick=function(e){
    var btn=e.target.closest('.tbl-save-btn');
    if(btn){
      e.stopPropagation();
      saveTblStatus(btn.getAttribute('data-sec'), parseInt(btn.getAttribute('data-idx')));
    }
  };
}

function opt(val, selected){ return '<option value="'+val+'"'+(selected?' selected':'')+'>'+val+'</option>'; }
function mkSelect(id, vals, cur, onch){
  var html='<select class="filter-select" id="'+id+'" onchange="'+onch+'">';
  vals.forEach(function(v){ html+='<option value="'+v+'"'+(cur===v?' selected':'')+'>'+v+'</option>'; });
  return html+'</select>';
}

function renderTickets(){
  var d=ds();
  function uniq(arr){ return arr.filter(function(v,i,a){ return v&&a.indexOf(v)===i; }); }
  var uSt=uniq(d.map(function(r){ return r.status; }));
  var uTi=uniq(d.map(function(r){ return r.tipoDemanda; }));
  var uCa=uniq(d.map(function(r){ return r.categoria; }));
  var uRe=uniq(d.map(function(r){ return r.respInterno; }).concat(d.map(function(r){ return r.respExterno; })));
  var rows=filtered(), total=rows.length;
  var start=(S.page-1)*S.pp;
  var pr=rows.slice(start,start+S.pp);
  var tp=Math.max(1,Math.ceil(total/S.pp));
  var ativos=rows.filter(function(r){ return r.status&&r.status!=='Encerrado'; }).length;
  var venc=rows.filter(function(r){ var d=diffDays(r.prazo); return r.status!=='Encerrado'&&d!==null&&d<0; }).length;
  var urg=rows.filter(function(r){ var d=diffDays(r.prazo); return r.status!=='Encerrado'&&d!==null&&d>=0&&d<=3; }).length;
  var enc=rows.filter(function(r){ return r.status==='Encerrado'; }).length;

  var stats='<div class="stats-row">'
    +'<div class="stat-card"><div class="sc-val">'+total+'</div><div class="sc-label">Total</div></div>'
    +'<div class="stat-card blue"><div class="sc-val">'+ativos+'</div><div class="sc-label">Em aberto</div></div>'
    +'<div class="stat-card red"><div class="sc-val">'+venc+'</div><div class="sc-label">Vencidos</div></div>'
    +'<div class="stat-card amber"><div class="sc-val">'+urg+'</div><div class="sc-label">Vence em 3d</div></div>'
    +'<div class="stat-card green"><div class="sc-val">'+enc+'</div><div class="sc-label">Encerrados</div></div>'
    +'</div>';

  var stOpts='<option value="">Todos os status</option>'+uSt.map(function(v){ return '<option value="'+v+'"'+(S.f.status===v?' selected':'')+'>'+v+'</option>'; }).join('');
  var tiOpts='<option value="">Todos os tipos</option>'+uTi.map(function(v){ return '<option value="'+v+'"'+(S.f.tipo===v?' selected':'')+'>'+v+'</option>'; }).join('');
  var caOpts='<option value="">Todas as categorias</option>'+uCa.map(function(v){ return '<option value="'+v+'"'+(S.f.cat===v?' selected':'')+'>'+v+'</option>'; }).join('');
  var reOpts='<option value="">Todos os responsáveis</option>'+uRe.map(function(v){ return '<option value="'+v+'"'+(S.f.resp===v?' selected':'')+'>'+v+'</option>'; }).join('');

  var toolbar='<div class="toolbar">'
    +'<div class="search-wrap"><span class="search-icon">🔍</span>'
    +'<input type="text" placeholder="Buscar ticket, cliente, processo..." id="inp-q" value="'+S.f.q+'" oninput="S.f.q=this.value;S.page=1;render()">'
    +'</div>'
    +'<select class="filter-select" onchange="S.f.status=this.value;S.page=1;render()">'+stOpts+'</select>'
    +'<select class="filter-select" onchange="S.f.tipo=this.value;S.page=1;render()">'+tiOpts+'</select>'
    +'<select class="filter-select" onchange="S.f.cat=this.value;S.page=1;render()">'+caOpts+'</select>'
    +'<select class="filter-select" onchange="S.f.resp=this.value;S.page=1;render()">'+reOpts+'</select>'
    +(S.f.q||S.f.status||S.f.tipo||S.f.cat||S.f.resp?'<button class="btn sm ghost" onclick="S.f={q:\'\',status:\'\',tipo:\'\',cat:\'\',resp:\'\'};S.page=1;render()">✕ Limpar</button>':'')
    +'</div>';

  var tbody='';
  if(pr.length===0){
    tbody='<tr><td colspan="8"><div class="empty-state"><div class="es-icon">📭</div><p>Nenhum ticket encontrado.</p></div></td></tr>';
  } else {
    pr.forEach(function(r){
      var ri=ds().indexOf(r);
      var sec=S.view.startsWith('rs')?'rs':'es';
      var d=diffDays(r.prazo);
      var uc2=uCls(d);
      var rc=uc2==='vencido'?'row-vencido':(uc2==='amanha'||uc2==='hoje'?'row-urgente':'');
      var ext=r.respExterno&&r.respExterno!==r.respInterno?'<div style="color:var(--text-muted);font-size:11px">'+r.respExterno+'</div>':'';
      var drv=r.linkDrive?'<a href="'+r.linkDrive+'" target="_blank" class="btn sm ghost" style="padding:4px 6px" title="Drive">📁</a> ':'';
      tbody+='<tr class="clickable '+rc+'" onclick="openDetail('+ri+')">'
        +'<td><span style="font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.3px">'+(r.ticket||'—')+'</span></td>'
        +'<td><div class="clip" title="'+r.cliente+'" style="font-weight:500;color:var(--navy)">'+(r.cliente||'—')+'</div></td>'
        +'<td><span class="badge '+tCls(r.tipoDemanda)+'">'+(r.tipoDemanda||'—')+'</span></td>'
        +'<td><div class="clip" style="font-size:12px;color:var(--text-dim)">'+(r.categoria||'—')+'</div></td>'
        +'<td><div style="font-size:12px"><div style="font-weight:600">'+(r.respInterno||'—')+'</div>'+ext+'</div></td>'
        +'<td><span class="deadline-chip '+uc2+'">'+uLbl(d,r.prazo)+'</span></td>'

        +'<div class="tbl-status-wrap">'
        +'<select class="tbl-status-select" data-sec="'+sec+'" data-idx="'+ri+'">'
        +STATUS_OPTS.map(function(o){ return '<option value="'+o+'"'+(r.status===o?' selected':'')+'>'+o+'</option>'; }).join('')

        +'</td></tr>';
    });
  }

  var pages='';
  for(var i=1;i<=tp;i++) pages+='<button class="page-btn'+(S.page===i?' active':'')+'" onclick="S.page='+i+';render()">'+i+'</button>';
  var shown=total===0?'0':''+Math.min(start+1,total)+'–'+Math.min(start+S.pp,total);
  var pag='<div class="pagination"><span>Mostrando '+shown+' de '+total+'</span>'
    +'<div class="page-btns">'
    +'<button class="page-btn" onclick="S.page=Math.max(1,S.page-1);render()"'+(S.page===1?' disabled':'')+'>‹</button>'
    +pages
    +'<button class="page-btn" onclick="S.page=Math.min('+tp+',S.page+1);render()"'+(S.page===tp?' disabled':'')+'>›</button>'
    +'</div></div>';

  return stats+toolbar+'<div class="table-wrap"><table><thead><tr>'
    +'<th>Ticket</th><th>Cliente / Posto</th><th>Tipo</th><th>Categoria</th>'
    +'<th>Responsáveis</th><th>Prazo</th><th>Status</th><th></th>'
    +'</tr></thead><tbody>'+tbody+'</tbody></table></div>'+pag;
}

function renderAgenda(){
  var rows=ds().filter(function(r){ return r.status!=='Encerrado'; });
  var sorted=sortUrg(rows).filter(function(r){ var d=diffDays(r.prazo); return d!==null&&d<=3; });
  var venc=sorted.filter(function(r){ return diffDays(r.prazo)<0; });
  var hj=sorted.filter(function(r){ return diffDays(r.prazo)===0; });
  var am=sorted.filter(function(r){ return diffDays(r.prazo)===1; });
  var br=sorted.filter(function(r){ var d=diffDays(r.prazo); return d>=2&&d<=3; });

  function cards(list,cls){
    if(!list.length) return '<p style="color:var(--text-muted);font-size:13px;padding:4px 0">Nenhuma demanda.</p>';
    return list.map(function(r){
      var ri=ds().indexOf(r); var d=diffDays(r.prazo);
      var drv=r.linkDrive?'<a href="'+r.linkDrive+'" target="_blank" class="btn sm ghost" onclick="event.stopPropagation()">📁 Drive</a>':'';
      var ri2=r.respInterno?'<span class="badge muted">👤 '+r.respInterno+'</span>':'';
      return '<div class="agenda-card '+cls+'" onclick="openDetail('+ri+')">'
        +'<div class="ac-top"><div><div class="ac-ticket">'+(r.ticket||'SEM TICKET')+'</div>'
        +'<div class="ac-cliente">'+(r.cliente||'—')+'</div></div>'
        +'<span class="deadline-chip '+uCls(d)+'">'+uLbl(d,r.prazo)+'</span></div>'
        +'<div class="ac-desc">'+(r.descricao||'—')+'</div>'
        +'<div class="ac-meta"><span class="badge '+tCls(r.tipoDemanda)+'">'+(r.tipoDemanda||'—')+'</span>'
        +'<span class="badge '+sCls(r.status)+'">'+(r.status||'—')+'</span>'+ri2+drv+'</div>'
        +'</div>';
    }).join('');
  }

  var stats='<div class="stats-row">'
    +'<div class="stat-card red"><div class="sc-val">'+venc.length+'</div><div class="sc-label">🔴 Vencidos</div></div>'
    +'<div class="stat-card" style="border-left:3px solid var(--orange)"><div class="sc-val" style="color:var(--orange)">'+hj.length+'</div><div class="sc-label">🟠 Hoje</div></div>'
    +'<div class="stat-card amber"><div class="sc-val">'+am.length+'</div><div class="sc-label">🟡 Amanhã</div></div>'
    +'<div class="stat-card blue"><div class="sc-val">'+br.length+'</div><div class="sc-label">🔵 Em 3 dias</div></div>'
    +'</div>';

  var secs=[
    {list:venc,cls:'vencido',label:'🔴 Vencidos',color:'var(--red)',bg:'var(--red-bg)'},
    {list:hj,cls:'hoje',label:'🟠 Vencem Hoje',color:'var(--orange)',bg:'var(--orange-bg)'},
    {list:am,cls:'amanha',label:'🟡 Amanhã',color:'var(--amber)',bg:'var(--amber-bg)'},
    {list:br,cls:'breve',label:'🔵 Em até 3 dias',color:'var(--accent)',bg:'var(--blue-bg)'}
  ];
  var body=secs.filter(function(s){ return s.list.length>0; }).map(function(s){
    return '<div class="agenda-section"><div class="agenda-section-header">'
      +'<h3 style="color:'+s.color+'">'+s.label+'</h3>'
      +'<span class="agenda-count" style="background:'+s.bg+';color:'+s.color+'">'+s.list.length+'</span>'
      +'</div>'+cards(s.list,s.cls)+'</div>';
  }).join('');

  return stats+(body||'<div class="empty-state"><div class="es-icon">✅</div><p>Nenhuma demanda urgente no momento.</p></div>');
}

function renderDash(){
  var all=S.data.rs.concat(S.data.es);
  var ativos=all.filter(function(r){ return r.status&&r.status!=='Encerrado'; });
  var venc=ativos.filter(function(r){ var d=diffDays(r.prazo); return d!==null&&d<0; });
  var urg=ativos.filter(function(r){ var d=diffDays(r.prazo); return d!==null&&d>=0&&d<=3; });
  var enc=all.filter(function(r){ return r.status==='Encerrado'; });

  var rm={};
  all.forEach(function(r){
    [r.respInterno,r.respExterno].forEach(function(name){
      if(!name)return;
      if(!rm[name]) rm[name]={total:0,ativos:0,venc:0,urg:0};
      rm[name].total++;
      if(r.status!=='Encerrado') rm[name].ativos++;
      var d=diffDays(r.prazo);
      if(d!==null&&d<0&&r.status!=='Encerrado') rm[name].venc++;
      if(d!==null&&d>=0&&d<=3&&r.status!=='Encerrado') rm[name].urg++;
    });
  });

  var rcards=Object.keys(rm).sort(function(a,b){ return rm[b].ativos-rm[a].ativos; }).map(function(name){
    var v=rm[name];
    return '<div class="team-card" data-resp="'+name+'" onclick="openDrawerFromCard(this)">'
      +'<div class="tc-name"><div class="tc-avatar">'+name.slice(0,2).toUpperCase()+'</div>'+name
      +'<span style="margin-left:auto;font-size:10px;color:var(--text-muted);font-weight:400">ver →</span></div>'
      +'<div class="tc-row"><span>Total de tickets</span><strong>'+v.total+'</strong></div>'
      +'<div class="tc-row"><span>Em aberto</span><strong style="color:var(--accent)">'+v.ativos+'</strong></div>'
      +'<div class="tc-divider"></div>'
      +'<div class="tc-row"><span>🔴 Vencidos</span><strong style="color:'+(v.venc>0?'var(--red)':'var(--text-muted)')+'">'+v.venc+'</strong></div>'
      +'<div class="tc-row"><span>⚡ Urgentes (3d)</span><strong style="color:'+(v.urg>0?'var(--amber)':'var(--text-muted)')+'">'+v.urg+'</strong></div>'
      +'</div>';
  }).join('');

  var cm={}, tm={};
  S.data.rs.filter(function(r){ return r.status!=='Encerrado'; }).forEach(function(r){
    if(r.categoria) cm[r.categoria]=(cm[r.categoria]||0)+1;
    if(r.tipoDemanda) tm[r.tipoDemanda]=(tm[r.tipoDemanda]||0)+1;
  });
  var ct=Object.values(cm).reduce(function(a,b){ return a+b; },0)||1;
  var tt=Object.values(tm).reduce(function(a,b){ return a+b; },0)||1;
  function barRows(map,total,color){
    return Object.keys(map).sort(function(a,b){ return map[b]-map[a]; }).map(function(k){
      return '<div class="cat-row"><div class="cat-label">'+k+'</div>'
        +'<div class="cat-bar-wrap"><div class="cat-bar" style="width:'+Math.round(map[k]/total*100)+'%;background:'+color+'"></div></div>'
        +'<div class="cat-count">'+map[k]+'</div></div>';
    }).join('');
  }

  // alert counts
  var hoje2=all.filter(function(r){ var d=diffDays(r.prazo); return r.status!=='Encerrado'&&d===0; });
  var amanha2=all.filter(function(r){ var d=diffDays(r.prazo); return r.status!=='Encerrado'&&d===1; });
  var dia3=all.filter(function(r){ var d=diffDays(r.prazo); return r.status!=='Encerrado'&&d===2; });

  var alertCards='<div class="alert-cards">'
    +'<div class="alert-card hoje" onclick="openDrawerByDay(0)" title="Ver tickets com prazo hoje">'
    +'<div class="ac-icon">🟠</div>'
    +'<div class="ac-info"><div class="ac-title">Vencem Hoje</div>'
    +'<div class="ac-count" style="color:var(--orange)">'+hoje2.length+'</div>'
    +'<div class="ac-sub">ticket'+(hoje2.length!==1?'s':'')+' com prazo no dia de hoje</div></div>'
    +'<div class="ac-arrow">›</div></div>'

    +'<div class="alert-card amanha" onclick="openDrawerByDay(1)" title="Ver tickets com prazo amanhã">'
    +'<div class="ac-icon">🟡</div>'
    +'<div class="ac-info"><div class="ac-title">Vencem Amanhã</div>'
    +'<div class="ac-count" style="color:var(--amber)">'+amanha2.length+'</div>'
    +'<div class="ac-sub">ticket'+(amanha2.length!==1?'s':'')+' com prazo amanhã</div></div>'
    +'<div class="ac-arrow">›</div></div>'

    +'<div class="alert-card terceiro" onclick="openDrawerByDay(2)" title="Ver tickets com prazo em 2 dias">'
    +'<div class="ac-icon">🔵</div>'
    +'<div class="ac-info"><div class="ac-title">Vencem em 2 dias</div>'
    +'<div class="ac-count" style="color:var(--accent)">'+dia3.length+'</div>'
    +'<div class="ac-sub">ticket'+(dia3.length!==1?'s':'')+' com prazo no 3º dia</div></div>'
    +'<div class="ac-arrow">›</div></div>'
    +'</div>';

  return '<div class="stats-row">'
    +'<div class="stat-card"><div class="sc-val">'+all.length+'</div><div class="sc-label">Total geral</div></div>'
    +'<div class="stat-card blue"><div class="sc-val">'+ativos.length+'</div><div class="sc-label">Em aberto</div></div>'
    +'<div class="stat-card red"><div class="sc-val">'+venc.length+'</div><div class="sc-label">Vencidos</div></div>'
    +'<div class="stat-card amber"><div class="sc-val">'+urg.length+'</div><div class="sc-label">Urgentes (3d)</div></div>'
    +'<div class="stat-card green"><div class="sc-val">'+enc.length+'</div><div class="sc-label">Encerrados</div></div>'
    +'</div>'
    +'<div class="overview-grid">'
    +'<div class="overview-card"><h4>Por Categoria — Rede Santana (ativos)</h4>'+barRows(cm,ct,'var(--navy)')+'</div>'
    +'<div class="overview-card"><h4>Por Tipo — Rede Santana (ativos)</h4>'+barRows(tm,tt,'var(--navy2)')+'</div>'
    +'</div>'
    +'<div class="dash-section"><h3>Carga por Responsável</h3>'
    +'<div class="team-cards">'+rcards+'</div>'
    +alertCards
    +'</div>';
}

function openModal(){
  document.getElementById('overlay').classList.remove('hidden');
  // Event delegation for footer action buttons
  document.getElementById('mf').onclick=function(e){
    var btn=e.target.closest('[data-action]');
    if(!btn)return;
    var action=btn.dataset.action;
    var sec=btn.dataset.sec;
    var idx=parseInt(btn.dataset.idx);
    closeModal();
    if(action==='edit') openEditSec(sec,idx);
    else if(action==='del') confirmDelSec(sec,idx);
  };
}
function closeModal(){ document.getElementById('overlay').classList.add('hidden'); }
function closeBg(e){ if(e.target===document.getElementById('overlay'))closeModal(); }

function gv(id){ var el=document.getElementById(id); return el?el.value:''; }
function collectForm(base){
  base=base||{};
  var isRS=S.view.startsWith('rs');
  return Object.assign({},base,{
    ticket:gv('f-ticket'),dataEntrada:gv('f-de'),cliente:gv('f-cli'),cnpj:gv('f-cnpj'),
    tipoDemanda:gv('f-tipo'),categoria:gv('f-cat'),processo:gv('f-proc'),
    tituloEmail:isRS?gv('f-temail'):'',origem:gv('f-ori'),
    emailEnviado:isRS?gv('f-email'):'',local:isRS?'':gv('f-local'),
    descricao:gv('f-desc'),respInterno:gv('f-ri'),respExterno:gv('f-re'),
    status:gv('f-st'),prazo:gv('f-prazo'),dataEncerramento:gv('f-enc'),
    linkDrive:gv('f-drv'),obs:gv('f-obs'),email2:gv('f-e2'),email3:gv('f-e3'),diasRestantes:''
  });
}

function nextTicket(){
  var isRS=S.view.startsWith('rs');
  var prefix=isRS?'RS':'PP';
  var all=S.data[isRS?'rs':'es'];
  var year=new Date().getFullYear().toString().slice(2);
  var max=0;
  all.forEach(function(r){
    if(!r.ticket)return;
    var m=r.ticket.match(/(\d{4})$/);
    if(m) max=Math.max(max,parseInt(m[1],10));
  });
  return prefix+'/'+year+'-'+String(max+1).padStart(4,'0');
}

function openNew(){
  var sec=S.view.startsWith('rs')?'Rede Santana':'Escritório';
  var suggested=nextTicket();
  document.getElementById('mh').innerHTML='<div><h2>Novo Ticket</h2><div style="font-size:12px;color:var(--text-muted);margin-top:4px">'+sec+' · Próximo: <strong style="color:var(--accent)">'+suggested+'</strong></div></div><button class="modal-close" onclick="closeModal()">✕</button>';
  document.getElementById('mb').innerHTML=buildForm({ticket:suggested});
  document.getElementById('mf').innerHTML='<button class="btn ghost" onclick="closeModal()">Cancelar</button><button class="btn primary" onclick="saveNew()">💾 Criar Ticket</button>';
  openModal();
}

function openEditSec(sec, idx){
  var prev=S.view;
  S.view=sec+'-tickets';
  openEdit(idx);
  S.view=prev;
}
function confirmDelSec(sec, idx){
  var prev=S.view;
  S.view=sec+'-tickets';
  confirmDel(idx);
  S.view=prev;
}
function openEdit(idx){
  var r=ds()[idx];
  document.getElementById('mh').innerHTML='<div><div style="font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px">Editar Ticket</div><h2>'+(r.ticket||r.cliente)+'</h2></div><button class="modal-close" onclick="closeModal()">✕</button>';
  document.getElementById('mb').innerHTML=buildForm(r);
  document.getElementById('mf').innerHTML='<button class="btn ghost" onclick="closeModal()">Cancelar</button><button class="btn primary" onclick="saveEdit('+idx+')">💾 Salvar Alterações</button>';
  openModal();
}

function saveNew(){
  var r=collectForm();
  if(!r.cliente){ toast('Informe o cliente.','error'); return; }
  S.data[S.view.startsWith('rs')?'rs':'es'].push(r);
  closeModal(); render(); toast('Ticket criado!','success');
}

function saveEdit(idx){
  ds()[idx]=collectForm(ds()[idx]);
  closeModal(); render(); toast('Ticket atualizado!','success');
}

function confirmDel(idx){
  var r=ds()[idx];
  if(!confirm('Excluir o ticket '+(r.ticket||r.cliente)+'?')) return;
  ds().splice(idx,1); render(); toast('Ticket excluído.','error');
}

function exportCSV(){
  var rows=filtered();
  var cols=['ticket','dataEntrada','cliente','cnpj','tipoDemanda','categoria','processo','origem','descricao','respInterno','respExterno','prazo','status','dataEncerramento','linkDrive','obs'];
  var hdr=['Ticket','Data Entrada','Cliente','CNPJ','Tipo','Categoria','Processo','Origem','Descrição','Resp. Interno','Resp. Externo','Prazo','Status','Encerramento','Drive','Obs'];
  var csv=[hdr].concat(rows.map(function(r){ return cols.map(function(c){ return '"'+((r[c]||'').replace(/"/g,'""'))+'"'; }); })).map(function(r){ return r.join(','); }).join('\n');
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}));
  a.download='tickets-'+(S.view.startsWith('rs')?'rs':'es')+'-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

  var newStatus=sel.value;
  S.data[sec][idx].status=newStatus;

function saveDrawerStatus(sec, idx){
  var sel=document.getElementById('sel-'+sec+'-'+idx);
  if(!sel)return;
  var newStatus=sel.value;
  S.data[sec][idx].status=newStatus;
  var card=document.getElementById('dtk-'+sec+'-'+idx);
  if(card){
    var d=diffDays(S.data[sec][idx].prazo);
    card.className='drawer-ticket '+uCls(d);
  }
  toast('Status atualizado: '+newStatus,'success');
  if(S.view==='dash') render();

  if(btn){
    var sec=btn.getAttribute('data-sec');
    var idx=parseInt(btn.getAttribute('data-idx'));
    saveDrawerStatus(sec, idx);
    return;
  }
  // Anything inside status row: ignore (don't open detail)
  if(e.target.closest('.dt-status-row')) return;
  // Title or description clicked: open detail
  if(e.target.closest('.dt-clickable')){
    var card=e.target.closest('[data-idx]');
    if(card){
      var sec2=card.getAttribute('data-sec');
      var idx2=parseInt(card.getAttribute('data-idx'));
      openDetail(idx2, sec2);
    }
  }
}

function openDrawerFromCard(el){
  var name=el.getAttribute('data-resp');
  if(name) openDrawer(name);
}


function openDrawer(name){
  var all=S.data.rs.concat(S.data.es);
  var tickets=all.filter(function(r){ return r.respInterno===name||r.respExterno===name; });
  var sorted=tickets.slice().sort(function(a,b){
    var da=diffDays(a.prazo), db=diffDays(b.prazo);
    if(da===null&&db===null)return 0;
    if(da===null)return 1; if(db===null)return -1;
    return da-db;
  });
  var ativos=tickets.filter(function(r){ return r.status!=='Encerrado'; }).length;
  var venc=tickets.filter(function(r){ var d=diffDays(r.prazo); return r.status!=='Encerrado'&&d!==null&&d<0; }).length;
  var av=document.getElementById('drawer-avatar');
  av.textContent=name.slice(0,2).toUpperCase();
  av.style.background='var(--navy)'; av.style.fontSize='11px';
  document.getElementById('drawer-name').textContent=name;
  document.getElementById('drawer-sub').textContent=tickets.length+' ticket'+(tickets.length!==1?'s':'')+' · '+ativos+' em aberto'+(venc>0?' · '+venc+' vencido'+(venc!==1?'s':''):'');
  var body='';
  if(sorted.length===0){
    body='<div class="drawer-empty">Nenhum ticket encontrado.</div>';
  } else {
    sorted.forEach(function(r){
      var sec=S.data.rs.indexOf(r)>=0?'rs':'es';
      var gi=S.data[sec].indexOf(r);
      var role=r.respInterno===name&&r.respExterno===name?'Interno e Externo':(r.respInterno===name?'Interno':'Externo');
      body+=buildDrawerTicket(r,sec,gi,'<span class="badge muted" style="font-size:10px">'+role+'</span>');
    });
  }
  showDrawer(body);
}

function openDrawerByDay(dayOffset){
  var labels={0:'Vencem Hoje',1:'Vencem Amanhã',2:'Vencem em 2 dias'};
  var icons={0:'🟠',1:'🟡',2:'🔵'};
  var all=S.data.rs.concat(S.data.es);
  var tickets=all.filter(function(r){
    var d=diffDays(r.prazo);
    return r.status!=='Encerrado'&&d===dayOffset;
  }).sort(function(a,b){ return (a.cliente||'').localeCompare(b.cliente||''); });
  var av=document.getElementById('drawer-avatar');
  av.textContent=icons[dayOffset]; av.style.background='transparent'; av.style.fontSize='20px';
  document.getElementById('drawer-name').textContent=labels[dayOffset];
  document.getElementById('drawer-sub').textContent=tickets.length+' ticket'+(tickets.length!==1?'s':'')+' com prazo '+(dayOffset===0?'hoje':dayOffset===1?'amanhã':'em 2 dias');
  var body='';
  if(tickets.length===0){
    body='<div class="drawer-empty">✅ Nenhum ticket com prazo neste dia.</div>';
  } else {
    tickets.forEach(function(r){
      var sec=S.data.rs.indexOf(r)>=0?'rs':'es';
      var gi=S.data[sec].indexOf(r);
      var resp=r.respInterno||r.respExterno||'—';
      body+=buildDrawerTicket(r,sec,gi,'<span class="badge muted" style="font-size:10px">👤 '+resp+'</span>');
    });
  }
  showDrawer(body);
}

function showDrawer(body){
  var db=document.getElementById('drawer-body');
  db.innerHTML=body;
  db.removeEventListener('click', drawerBodyClick);
  db.addEventListener('click', drawerBodyClick);
  document.getElementById('drawer-overlay').classList.remove('hidden');
  document.getElementById('drawer').classList.remove('hidden');
}

function closeDrawer(){
  document.getElementById('drawer-overlay').classList.add('hidden');
  document.getElementById('drawer').classList.add('hidden');
}
</script>

<div class="drawer-overlay hidden" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer hidden" id="drawer">
  <div class="drawer-header">
    <div class="dh-left">
      <div class="tc-avatar" id="drawer-avatar" style="width:32px;height:32px;font-size:13px"></div>
      <div>
        <h3 id="drawer-name"></h3>
        <div class="dh-sub" id="drawer-sub"></div>
      </div>
    </div>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
</div>
</body>
</html>
